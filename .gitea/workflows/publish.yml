name: Build and Publish Images (Unified)

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_PREFIX: gitea.labgophers.com/${{ gitea.repository_owner }}/coder-images

jobs:
  # Detect platform and output configuration
  detect-platform:
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.detect.outputs.platform }}
      registry: ${{ steps.detect.outputs.registry }}
      image-prefix: ${{ steps.detect.outputs.image-prefix }}
      platforms: ${{ steps.detect.outputs.platforms }}
    steps:
      - name: Detect platform
        id: detect
        run: |
          if [ -n "${{ gitea.repository_owner }}" ]; then
            echo "platform=gitea" >> $GITHUB_OUTPUT
            echo "registry=${{ vars.GITEA_REGISTRY || 'gitea.labgophers.com' }}" >> $GITHUB_OUTPUT
            echo "image-prefix=${{ vars.GITEA_REGISTRY || 'gitea.labgophers.com' }}/${{ gitea.repository_owner }}/coder-images" >> $GITHUB_OUTPUT
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "🟢 Running on Gitea (amd64 only, no binfmt_misc in Talos kernel)"
          else
            echo "platform=github" >> $GITHUB_OUTPUT
            echo "registry=ghcr.io" >> $GITHUB_OUTPUT
            echo "image-prefix=ghcr.io/${{ github.repository_owner }}/coder-images" >> $GITHUB_OUTPUT
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "🟢 Running on GitHub (multi-arch)"
          fi

      - name: Show configuration
        run: |
          echo "Platform: ${{ steps.detect.outputs.platform }}"
          echo "Registry: ${{ steps.detect.outputs.registry }}"
          echo "Image Prefix: ${{ steps.detect.outputs.image-prefix }}"

  # Build base image first (required by dependent images)
  build-base:
    runs-on: ubuntu-latest
    needs: detect-platform
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: needs.detect-platform.outputs.platform != 'gitea'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.detect-platform.outputs.registry }}
          username: ${{ gitea.actor }}
          password: ${{ gitea.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect-platform.outputs.image-prefix }}-base
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/base/Dockerfile
          platforms: ${{ needs.detect-platform.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-base:buildcache
          cache-to: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-base:buildcache,mode=max
          provenance: false

      - name: Output base image info
        run: |
          echo "✅ Base image built on ${{ needs.detect-platform.outputs.platform }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Registry: ${{ needs.detect-platform.outputs.registry }}"

  # Build independent images (podman, kali-desktop)
  build-independent:
    runs-on: ubuntu-latest
    needs: detect-platform
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [podman, kali-desktop]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: needs.detect-platform.outputs.platform != 'gitea'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.detect-platform.outputs.registry }}
          username: ${{ gitea.actor }}
          password: ${{ gitea.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/${{ matrix.image }}/Dockerfile
          platforms: ${{ needs.detect-platform.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}:buildcache,mode=max
          provenance: false

  # Build images that depend on base
  build-dependent:
    runs-on: ubuntu-latest
    needs: [detect-platform, build-base]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [golang, xsoar, terraform, ubuntu-desktop]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine base image reference
        id: base-ref
        run: |
          if [[ -n "${{ needs.build-base.outputs.digest }}" ]]; then
            echo "reference=${{ needs.build-base.outputs.digest }}" >> $GITHUB_OUTPUT
            echo "Using base digest: ${{ needs.build-base.outputs.digest }}"
          else
            # Fallback to latest
            echo "reference=latest" >> $GITHUB_OUTPUT
            echo "Using base tag: latest"
          fi

      - name: Set up QEMU
        if: needs.detect-platform.outputs.platform != 'gitea'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.detect-platform.outputs.registry }}
          username: ${{ gitea.actor }}
          password: ${{ gitea.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            latest=false

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/${{ matrix.image }}/Dockerfile
          platforms: ${{ needs.detect-platform.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ needs.detect-platform.outputs.image-prefix }}-${{ matrix.image }}:buildcache,mode=max
          provenance: false
          build-args: |
            REGISTRY=${{ needs.detect-platform.outputs.registry }}
            IMAGE_OWNER=${{ gitea.repository_owner || github.repository_owner }}
            BASE_TAG=${{ steps.base-ref.outputs.reference }}

      - name: Output image info
        run: |
          echo "✅ ${{ matrix.image }} built on ${{ needs.detect-platform.outputs.platform }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
